name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag matching Gradle version (for example MP3PlayerVoltune2.4.4)
        required: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle and validate wrapper
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run Android lint
        run: ./gradlew lintDebug

      - name: Compile instrumentation tests
        run: ./gradlew assembleDebugAndroidTest

      - name: Build verification APK
        run: ./gradlew assembleDebug

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: verification-reports
          if-no-files-found: ignore
          retention-days: 14
          path: |
            app/build/reports/tests/**
            app/build/reports/lint-results-*

  release:
    if: github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle and validate wrapper
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Resolve and validate release metadata
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          VERSION_NAME="$(./gradlew -q :app:printVersionName | tail -n 1)"
          EXPECTED_TAG="MP3PlayerVoltune${VERSION_NAME}"
          if [ -z "$VERSION_NAME" ] || [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag must be $EXPECTED_TAG, received: $RELEASE_TAG" >&2
            exit 1
          fi
          echo "RELEASE_NAME=MP3 Player Voltune $VERSION_NAME" >> "$GITHUB_ENV"

      - name: Restore release keystore
        env:
          MP3_RELEASE_KEYSTORE_BASE64: ${{ secrets.MP3_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$MP3_RELEASE_KEYSTORE_BASE64" ]; then
            echo "MP3_RELEASE_KEYSTORE_BASE64 is not configured" >&2
            exit 1
          fi
          echo "$MP3_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/mp3player-release.keystore"
          echo "MP3_RELEASE_KEYSTORE=$RUNNER_TEMP/mp3player-release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          MP3_RELEASE_KEY_ALIAS: ${{ secrets.MP3_RELEASE_KEY_ALIAS }}
          MP3_RELEASE_STORE_PASS: ${{ secrets.MP3_RELEASE_STORE_PASS }}
          MP3_RELEASE_KEY_PASS: ${{ secrets.MP3_RELEASE_KEY_PASS }}
        run: ./gradlew assembleRelease

      - name: Prepare release APK
        run: cp app/build/outputs/apk/release/app-release.apk MP3-Player-Voltune.apk

      - name: Upload signed release APK
        uses: actions/upload-artifact@v6
        with:
          name: MP3-Player-Voltune-release
          path: MP3-Player-Voltune.apk

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ env.RELEASE_NAME }}
          body_path: RELEASE_NOTES.md
          files: MP3-Player-Voltune.apk
          fail_on_unmatched_files: true
