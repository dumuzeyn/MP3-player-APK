name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub Release tag to create or update
        required: true
        default: MP3Player2.4

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run Android lint
        run: ./gradlew lintDebug

      - name: Compile instrumentation tests
        run: ./gradlew assembleDebugAndroidTest

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: verification-reports
          if-no-files-found: ignore
          retention-days: 14
          path: |
            app/build/reports/tests/**
            app/build/reports/lint-results-*

  release:
    if: github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Restore release keystore
        env:
          MP3_RELEASE_KEYSTORE_BASE64: ${{ secrets.MP3_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$MP3_RELEASE_KEYSTORE_BASE64" ]; then
            echo "MP3_RELEASE_KEYSTORE_BASE64 is not configured" >&2
            exit 1
          fi
          echo "$MP3_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/mp3player-release.keystore"
          echo "MP3_RELEASE_KEYSTORE=$RUNNER_TEMP/mp3player-release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          MP3_RELEASE_KEY_ALIAS: ${{ secrets.MP3_RELEASE_KEY_ALIAS }}
          MP3_RELEASE_STORE_PASS: ${{ secrets.MP3_RELEASE_STORE_PASS }}
          MP3_RELEASE_KEY_PASS: ${{ secrets.MP3_RELEASE_KEY_PASS }}
        run: ./gradlew assembleRelease

      - name: Prepare release APK
        run: cp app/build/outputs/apk/release/app-release.apk MP3-Player.apk

      - name: Upload signed release APK
        uses: actions/upload-artifact@v6
        with:
          name: MP3-Player-release
          path: MP3-Player.apk

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag }}
          body_path: RELEASE_NOTES.md
          files: MP3-Player.apk
          fail_on_unmatched_files: true
