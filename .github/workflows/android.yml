name: Android Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build and test APKs
        run: ./gradlew clean testDebugUnitTest assembleDebug assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MP3-Player-release
          path: app/build/outputs/apk/release/*.apk
