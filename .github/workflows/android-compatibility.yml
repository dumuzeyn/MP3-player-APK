name: Android Compatibility

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * 1"

permissions:
  contents: read

concurrency:
  group: android-compatibility-${{ github.ref }}
  cancel-in-progress: false

jobs:
  instrumentation:
    name: Android ${{ matrix.android }} (API ${{ matrix.api }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - android: "8"
            api: 26
          - android: "9"
            api: 28
          - android: "10"
            api: 29
          - android: "11"
            api: 30
          - android: "12"
            api: 31
          - android: "13"
            api: 33
          - android: "14"
            api: 34
          - android: "15"
            api: 35
          - android: "16"
            api: 36

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant script permissions
        run: chmod +x ./gradlew ./.github/scripts/run-instrumentation-tests.sh

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumentation and background playback tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ANDROID_VERSION: ${{ matrix.android }}
          API_LEVEL: ${{ matrix.api }}
        with:
          api-level: ${{ matrix.api }}
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -no-snapshot -noaudio
            -no-boot-anim -camera-back none
          script: ./.github/scripts/run-instrumentation-tests.sh

      - name: Upload Android ${{ matrix.android }} reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.android }}-api-${{ matrix.api }}-reports
          if-no-files-found: warn
          retention-days: 14
          path: |
            app/build/reports/androidTests/connected/**
            app/build/outputs/androidTest-results/connected/**
            build/reports/emulator/**
