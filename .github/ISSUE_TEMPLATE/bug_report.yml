name: Bug report
description: Report a reproducible problem in MP3 Player Voltune
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe what happened and what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Tap...\n3. Observe..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: 2.4.3
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and Android version
      placeholder: realme GT Neo2 5G, Android 13
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Remove private file paths and music URIs before attaching logs.
